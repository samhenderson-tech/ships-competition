<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hormuz Strait Race - Ship Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- App styles -->
  <link rel="stylesheet" href="style.css?v=9">
</head>
<body>

  <!-- Password Gate -->
  <div id="password-gate">
    <div class="gate-box">
      <div class="gate-title">HORMUZ RACE</div>
      <div class="gate-subtitle">Enter password to continue</div>
      <input type="password" id="gate-input" placeholder="Password" autofocus>
      <button id="gate-btn">Enter</button>
      <div id="gate-error"></div>
    </div>
  </div>

  <!-- Header (slim) -->
  <header class="header">
    <div class="header-left">
      <div class="logo">HORMUZ RACE</div>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <div class="header-actions">
        <button class="header-btn refresh-btn" id="refresh-btn" onclick="tracker.refreshPositions()">Refresh</button>
        <button class="header-btn" onclick="tracker.exportState()">Export</button>
        <button class="header-btn" onclick="document.getElementById('import-file').click()">Import</button>
        <button class="header-btn" onclick="tracker.resetAll()">Reset</button>
        <input type="file" id="import-file" accept=".json" onchange="tracker.importState(this.files[0])">
      </div>
      <div id="refresh-status" class="refresh-status" style="display:none"></div>
    </div>
  </header>

  <!-- Race Banner -->
  <div class="race-banner">
    <div class="finish-slots" id="finish-slots"></div>
    <div class="race-info">
      <div class="closest-ship" id="closest-ship"></div>
      <div class="race-progress" id="race-progress">0 of 5 ships have crossed</div>
    </div>
  </div>

  <!-- Winner Banner -->
  <div class="winner-banner" id="winner-banner" style="display:none"></div>

  <!-- Mobile Tabs -->
  <div class="mobile-tabs" id="mobile-tabs">
    <button class="tab active" data-tab="leaderboard">Leaderboard</button>
    <button class="tab" data-tab="map">Map</button>
    <button class="tab" data-tab="ships">Ships</button>
    <button class="tab" data-tab="log">Log</button>
    <button class="tab" data-tab="updated">Updated</button>
  </div>

  <!-- Main 3-Column Layout -->
  <div class="race-layout">
    <!-- Leaderboard -->
    <aside class="race-leaderboard panel" id="panel-leaderboard">
      <div class="panel-title">Leaderboard</div>
      <div id="scoreboard"></div>
    </aside>

    <!-- Map -->
    <main class="race-map-container panel" id="panel-map">
      <div id="map"></div>
    </main>

    <!-- Race Log -->
    <aside class="race-log panel" id="panel-log">
      <div class="panel-title">Race Log</div>
      <div id="race-log"></div>
    </aside>
  </div>

  <!-- Ship List (full-width) -->
  <div class="ship-list-section panel" id="panel-ships">
    <div class="ship-list-header">
      <div class="ship-list-title">All Ships</div>
      <div class="sort-controls">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn active" data-sort="distance" onclick="tracker.setSort('distance')">Distance</button>
        <button class="sort-btn" data-sort="owner" onclick="tracker.setSort('owner')">Owner</button>
      </div>
    </div>
    <div id="ship-list"></div>
  </div>

  <!-- Updated List -->
  <div class="updated-list-section panel" id="panel-updated">
    <div class="panel-title">Last Updated</div>
    <div id="updated-list"></div>
  </div>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Celebration Banner -->
  <div class="celebration-banner" id="celebration-banner"></div>

  <!-- Password gate script -->
  <script>
    (function() {
      const PASS = "race";
      const gate = document.getElementById("password-gate");
      const input = document.getElementById("gate-input");
      const btn = document.getElementById("gate-btn");
      const error = document.getElementById("gate-error");

      if (sessionStorage.getItem("hormuz-auth") === "1") {
        gate.classList.add("hidden");
        return;
      }

      // Prevent app scripts from loading until authenticated
      document.body.dataset.locked = "1";

      function tryUnlock() {
        if (input.value === PASS) {
          sessionStorage.setItem("hormuz-auth", "1");
          gate.classList.add("hidden");
          delete document.body.dataset.locked;
          // Load app scripts
          var s1 = document.createElement("script");
          s1.src = "data.js?v=9";
          document.body.appendChild(s1);
          s1.onload = function() {
            var s2 = document.createElement("script");
            s2.src = "app.js?v=9";
            document.body.appendChild(s2);
          };
        } else {
          error.textContent = "Wrong password";
          input.value = "";
          input.focus();
        }
      }

      btn.addEventListener("click", tryUnlock);
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter") tryUnlock();
      });
    })();
  </script>

  <!-- App scripts (loaded by gate if not already authenticated) -->
  <script>
    if (!document.body.dataset.locked) {
      document.write('<scr' + 'ipt src="data.js?v=9"><\/scr' + 'ipt>');
      document.write('<scr' + 'ipt src="app.js?v=9"><\/scr' + 'ipt>');
    }
  </script>
</body>
</html>
