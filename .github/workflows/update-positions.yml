name: Update Ship Positions

on:
  schedule:
    # Every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest positions
        run: node scripts/update-positions.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          if git diff --staged --quiet; then
            echo "No position changes detected"
          else
            git commit -m "Update ship positions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
